name: publish
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/875189167966/locations/global/workloadIdentityPools/github/providers/clutchcall
          service_account: gh-publish@technomers-internal.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          MOD=github.com/clutchcall/go-sdk
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then V="$GITHUB_REF_NAME"; else V="v1.0.0"; fi
          rm -rf /tmp/gostage; D="/tmp/gostage/$MOD@$V"; mkdir -p "$D"
          tar cf - $(git ls-files) | ( cd "$D" && tar xf - )
          ( cd /tmp/gostage && zip -D -qr /tmp/go.zip github.com )
          B="gs://clutchcall-packages/go/$MOD/@v"; T="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gcloud storage cp go.mod "$B/$V.mod"
          gcloud storage cp /tmp/go.zip "$B/$V.zip"
          printf '{"Version":"%s","Time":"%s"}' "$V" "$T" | gcloud storage cp - "$B/$V.info"
          printf '{"Version":"%s","Time":"%s"}' "$V" "$T" | gcloud storage cp - "$B/@latest"
          { curl -fsSL https://artifacts.clutchcall.dev/go/$MOD/@v/list 2>/dev/null || true; echo "$V"; } | grep -vE '^$' | sort -u -V | gcloud storage cp - "$B/list"
